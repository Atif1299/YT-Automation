# Release tagged builds (v*): set repository secrets as needed.
# GOOGLE_CLIENT_ID — OAuth Desktop client ID injected into google-client-id.json (required for working sign-in in shipped builds).
# CI builds use --publish never (avoid 403 uploading to Releases). Download installers from the workflow run Artifacts.
#
# Signing (optional but recommended for production):
# - Windows: secrets WINDOWS_CERTIFICATE_FILE (base64 .pfx), WINDOWS_CERTIFICATE_PASSWORD
#            or use CSC_LINK / CSC_KEY_PASSWORD env (electron-builder standard).
# - macOS: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID, plus certificates in keychain
#          on the runner, or ASC provider API key files — see https://www.electron.build/code-signing
#
# For unsigned CI artifacts, omit secrets; Smart Screen / Gatekeeper may warn users.

name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Require repository secret GOOGLE_CLIENT_ID
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "::error::Add secret GOOGLE_CLIENT_ID: Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi
        shell: bash

      - name: Inject Google OAuth client ID
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: node scripts/write-google-client-id.js

      - name: Verify OAuth client ID for release build
        run: node scripts/check-google-client-id.js --strict

      - name: Build Windows (no GitHub publish — use Artifacts below)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: npm run predist && npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/

  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Require repository secret GOOGLE_CLIENT_ID
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "::error::Add secret GOOGLE_CLIENT_ID: Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi
        shell: bash

      - name: Inject Google OAuth client ID
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: node scripts/write-google-client-id.js

      - name: Verify OAuth client ID for release build
        run: node scripts/check-google-client-id.js --strict

        
      # electron-builder Darwin requires ≥512×512; always normalize so CI never depends on repo icon size.
      - name: Normalize app icon to 512×512
        run: |
          set -e
          test -f build/icon.png
          sips -z 512 512 build/icon.png --out build/icon.png
          sips -g pixelWidth -g pixelHeight build/icon.png

      - name: Build macOS (no GitHub publish — use Artifacts below)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # Unsigned CI builds: skip signing auto-discovery (no Apple cert on runner).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # When you add signing secrets, remove CSC_IDENTITY_AUTO_DISCOVERY or set signing vars below:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run predist && npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: dist/
